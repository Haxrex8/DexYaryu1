<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Pokédex</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #cfcfcf;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.pokedex-card {
    width: min(1200px, 95vw);
    background: white;
    border-radius: 30px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
}

.pokemon-image {
    width: 100%;
    max-width: 900px;
    height: auto;
}

.number {
    font-size: 24px;
    color: gray;
    margin-top: 10px;
}

.name {
    font-size: 52px;
    font-weight: bold;
    margin: 20px 0;
}

.types {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.type {
    padding: 10px 16px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 18px;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
}

.type-icon {
    width: 24px;
    height: 24px;
}

/* TYPES */
.normal { background:#9da0a2; }
.fire { background:#f4313f; }
.water { background:#00b2e2; }
.electric { background:#e0cc00; color:black; }
.grass { background:#00ae41; }
.ice { background:#82dade; color:black; }
.fighting { background:#d79a2a; }
.poison { background:#a77bc8; }
.ground { background:#ca8241; color:black; }
.flying { background:#56b3e4; }
.psychic { background:#f67eb4; }
.bug { background:#a8c27e; }
.rock { background:#8b8179; }
.ghost { background:#a67db1; }
.dragon { background:#0083ae; }
.dark { background:#5a6771; }
.steel { background:#979899; color:black; }
.fairy { background:#f3b1db; color:black; }
.mystery { background:#444; }

.nav {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #333;
    color: white;
}

button:hover { background: #555; }

input, select {
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="pokedex-card">

    <img id="img" class="pokemon-image">

    <div class="number" id="num"></div>
    <div class="name" id="name"></div>

    <div class="types" id="types"></div>

    <div class="nav">
        <button onclick="prev()">⬅ Prev</button>
        <button onclick="next()">Next ➡</button>
        <button onclick="randomPokemon()">🎲 Random</button>
    </div>

    <div class="nav">
        <input id="searchInput" placeholder="Search Pokémon">
        <input id="jumpDex" type="number" placeholder="Dex #">
        <button onclick="jumpToDex()">Go</button>

        <select id="typeFilter">
            <option value="">All Types</option>
            <option value="grass">Grass</option>
            <option value="fire">Fire</option>
            <option value="water">Water</option>
            <option value="electric">Electric</option>
            <option value="ice">Ice</option>
            <option value="fighting">Fighting</option>
            <option value="poison">Poison</option>
            <option value="ground">Ground</option>
            <option value="flying">Flying</option>
            <option value="psychic">Psychic</option>
            <option value="bug">Bug</option>
            <option value="rock">Rock</option>
            <option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option>
            <option value="dark">Dark</option>
            <option value="steel">Steel</option>
            <option value="fairy">Fairy</option>
            <option value="normal">Normal</option>
        </select>
    </div>

</div>

<script>

/* ================= RAW DATA (FIXED) ================= */

const raw = `

/* ================= PARSE ================= */

const pokedex = raw
.trim()
.split("\n")
.map(line => {
    const match = line.match(/^\s*(.+?)\s*\((.+?)\)\s*$/);
    if (!match) return null;

    return {
        name: match[1].trim(),
        types: match[2].split("/").map(t => t.trim().toLowerCase())
    };
})
.filter(Boolean);

console.log("Pokédex loaded:", pokedex.length);

/* ================= DEX ================= */

const dexMap = {};
let dexCounter = 1;

function baseName(name) {
    return name.startsWith("SB-") ? name.replace("SB-", "") : name;
}

pokedex.forEach(p => {
    const base = baseName(p.name);
    if (!dexMap[base]) dexMap[base] = dexCounter++;
    p.dex = dexMap[base];
});

/* ================= STATE ================= */

let index = 0;
let currentRender = 0;
let filtered = pokedex;

/* ================= UI ================= */

function cap(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
}

function renderTypes(types) {
    const el = document.getElementById("types");
    el.innerHTML = "";

    types.forEach(t => {
        const div = document.createElement("div");
        div.className = "type " + t;

        const img = document.createElement("img");
        img.src = `${t}.png`;
        img.className = "type-icon";

        div.appendChild(img);
        div.appendChild(document.createTextNode(" " + cap(t)));

        el.appendChild(div);
    });
}

function showPokemon(p) {
    document.getElementById("name").textContent = p.name;
    document.getElementById("num").textContent =
        `#${String(p.dex).padStart(3, "0")}`;
    renderTypes(p.types);
}

function showLocked(p) {
    document.getElementById("name").textContent = "???";
    document.getElementById("num").textContent =
        `#${String(p.dex).padStart(3, "0")}`;
    document.getElementById("types").innerHTML = "";
    document.getElementById("img").src = "locked.png";
}

/* ================= SAFE RENDER ================= */

function render(i) {

    const p = filtered[i];
    if (!p) return;

    const renderId = ++currentRender;
    const testImg = new Image();

    testImg.onload = () => {
        if (renderId !== currentRender) return;
        document.getElementById("img").src = `${p.name}.png`;
        showPokemon(p);
    };

    testImg.onerror = () => {
        if (renderId !== currentRender) return;
        showLocked(p);
    };

    testImg.src = `${p.name}.png`;
}

/* ================= NAV ================= */

function next() {
    index = (index + 1) % filtered.length;
    render(index);
}

function prev() {
    index = (index - 1 + filtered.length) % filtered.length;
    render(index);
}

function randomPokemon() {
    let newIndex;
    do {
        newIndex = Math.floor(Math.random() * filtered.length);
    } while (newIndex === index);

    index = newIndex;
    render(index);
}

/* ================= SEARCH ================= */

document.getElementById("searchInput").addEventListener("input", e => {
    const v = e.target.value.toLowerCase().trim();
    if (!v) return;

    const found = filtered.findIndex(p =>
        p.name.toLowerCase().includes(v)
    );

    if (found >= 0) {
        index = found;
        render(index);
    }
});

/* ================= JUMP ================= */

function jumpToDex() {
    const dex = parseInt(document.getElementById("jumpDex").value);
    const found = filtered.findIndex(p => p.dex === dex);

    if (found >= 0) {
        index = found;
        render(index);
    }
}

/* ================= TYPE FILTER ================= */

document.getElementById("typeFilter").addEventListener("change", e => {
    const t = e.target.value;

    filtered = t
        ? pokedex.filter(p => p.types.includes(t))
        : pokedex;

    index = 0;
    render(index);
});

/* ================= SWIPE ================= */

let touchStartX = 0;

document.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e => {
    const diff = touchStartX - e.changedTouches[0].screenX;

    if (diff > 50) next();
    else if (diff < -50) prev();
});

/* ================= INIT ================= */

render(index);

</script>

</body>
</html>
