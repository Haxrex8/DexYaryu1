<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Pokédex</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #cfcfcf;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.pokedex-card {
    width: min(1200px, 95vw);
    background: white;
    border-radius: 30px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    transition: transform 0.35s ease, opacity 0.35s ease;
}

/* ANIMATION STATES */
.fade-out {
    opacity: 0;
    transform: translateY(10px);
}

.fade-in {
    opacity: 1;
    transform: translateY(0px);
}

/* IMAGE */
.pokemon-image {
    width: 100%;
    max-width: 900px;
    height: auto;
    transition: opacity 0.25s ease;
}

/* TEXT */
.number { font-size: 24px; color: gray; margin-top: 10px; }
.name { font-size: 52px; font-weight: bold; margin: 20px 0; }
.evo { font-size: 14px; color: #666; margin-bottom: 10px; }

/* TYPES */
.types {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.type {
    padding: 10px 16px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 18px;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
}

.type-icon { width: 24px; height: 24px; }

/* COLORS */
.normal { background:#9da0a2; }
.fire { background:#f4313f; }
.water { background:#00b2e2; }
.electric { background:#e0cc00; color:black; }
.grass { background:#00ae41; }
.ice { background:#82dade; color:black; }
.fighting { background:#d79a2a; }
.poison { background:#a77bc8; }
.ground { background:#ca8241; color:black; }
.flying { background:#56b3e4; }
.psychic { background:#f67eb4; }
.bug { background:#a8c27e; }
.rock { background:#8b8179; }
.ghost { background:#a67db1; }
.dragon { background:#0083ae; }
.dark { background:#5a6771; }
.steel { background:#979899; color:black; }
.fairy { background:#f3b1db; color:black; }

/* NAV */
.nav {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

button {
    padding: 12px 18px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #333;
    color: white;
}

button:hover { background: #555; }

input, select {
    padding: 10px;
    font-size: 14px;
}

/* AUTOCOMPLETE */
.autocomplete {
    position: relative;
    display: inline-block;
}

.suggestions {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid #ccc;
    max-height: 180px;
    overflow-y: auto;
    z-index: 10;
}

.suggestion {
    padding: 8px;
    cursor: pointer;
}

.suggestion:hover {
    background: #eee;
}
</style>
</head>

<body>

<div class="pokedex-card" id="card">

    <img id="img" class="pokemon-image">

    <div class="number" id="num"></div>
    <div class="name" id="name"></div>
    <div class="evo" id="evo"></div>

    <div class="types" id="types"></div>

    <div class="nav">
        <button onclick="prev()">⬅ Prev</button>
        <button onclick="next()">Next ➡</button>
        <button onclick="randomPokemon()">🎲 Random</button>
    </div>

    <div class="nav">

        <div class="autocomplete">
            <input id="searchInput" placeholder="Search Pokémon" oninput="updateAutocomplete()">
            <div id="suggestions" class="suggestions"></div>
        </div>

        <input id="jumpDex" type="number" placeholder="Dex #">
        <button onclick="jumpToDex()">Go</button>

        <select id="typeFilter" onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="fire">Fire</option>
            <option value="water">Water</option>
            <option value="grass">Grass</option>
            <option value="electric">Electric</option>
            <option value="ice">Ice</option>
            <option value="fighting">Fighting</option>
            <option value="poison">Poison</option>
            <option value="ground">Ground</option>
            <option value="flying">Flying</option>
            <option value="psychic">Psychic</option>
            <option value="bug">Bug</option>
            <option value="rock">Rock</option>
            <option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option>
            <option value="dark">Dark</option>
            <option value="steel">Steel</option>
            <option value="fairy">Fairy</option>
            <option value="normal">Normal</option>
        </select>

    </div>
</div>

<script>

/* ================= DATA ================= */

const rawList = `Kakalil (Grass)
Fronglow (Grass)
Verdalete (Grass/Fighting)
SB-Verdalete (Grass/Fighting/Ground)
Scorchirp (Fire)
Pyrill (Fire)
Reviling (Fire/Flying)
SB-Reviling (Fire/Flying/Ghost)`.split("\n"); // shortened for readability

/* ================= PARSE ================= */

const pokedex = rawList.map(line => {
    const [name, typeStr] = line.split(" (");
    const types = typeStr.replace(")", "").split("/").map(t => t.toLowerCase());

    return {
        name: name.trim(),
        base: name.replace(/^(SB-|Y-|Z-)/, "").trim(),
        types
    };
});

/* ================= EVOLUTION GROUPS ================= */

const evoGroups = new Map();
let evoId = 1;

pokedex.forEach(p => {
    if (!evoGroups.has(p.base)) evoGroups.set(p.base, evoId++);
    p.evo = evoGroups.get(p.base);
});

/* ================= STATE ================= */

let index = 0;
let filtered = [...pokedex];
let currentRender = 0;

/* ================= SOUND SYSTEM ================= */

const sounds = {
    fire: "sounds/fire.mp3",
    water: "sounds/water.mp3",
    grass: "sounds/grass.mp3",
    electric: "sounds/electric.mp3",
    ice: "sounds/ice.mp3",
    default: "sounds/default.mp3"
};

function playSound(type) {
    const audio = new Audio(sounds[type] || sounds.default);
    audio.volume = 0.4;
    audio.play();
}

/* ================= FILTER ================= */

function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const type = document.getElementById("typeFilter").value;

    filtered = pokedex.filter(p => {
        return (!search || p.name.toLowerCase().includes(search)) &&
               (!type || p.types.includes(type));
    });

    index = 0;
    render(index);
}

/* ================= AUTOCOMPLETE ================= */

function updateAutocomplete() {
    const val = document.getElementById("searchInput").value.toLowerCase();
    const box = document.getElementById("suggestions");

    box.innerHTML = "";

    if (!val) return;

    const matches = pokedex.filter(p =>
        p.name.toLowerCase().includes(val)
    ).slice(0, 6);

    matches.forEach(p => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.textContent = p.name;
        div.onclick = () => {
            document.getElementById("searchInput").value = p.name;
            box.innerHTML = "";
            applyFilters();
        };
        box.appendChild(div);
    });
}

/* ================= RENDER (ANIMATED) ================= */

function render(i) {
    if (!filtered.length) return;

    const card = document.getElementById("card");
    const p = filtered[i];

    card.classList.add("fade-out");

    setTimeout(() => {

        const img = document.getElementById("img");
        const file = p.name.replace(/\s+/g, "_") + ".png";

        const test = new Image();

        test.onload = () => {
            img.src = file;
        };

        test.onerror = () => {
            img.src = "locked.png";
        };

        test.src = file;

        document.getElementById("name").textContent = p.name;
        document.getElementById("num").textContent = `#${String(p.evo).padStart(3,"0")}`;
        document.getElementById("evo").textContent = `Evolution Group ${p.evo}`;

        renderTypes(p.types);
        playSound(p.types[0]);

        card.classList.remove("fade-out");
        card.classList.add("fade-in");

        currentRender++;

    }, 200);
}

/* ================= TYPES ================= */

function renderTypes(types) {
    const el = document.getElementById("types");
    el.innerHTML = "";

    types.forEach(t => {
        const div = document.createElement("div");
        div.className = "type " + t;
        div.textContent = t;
        el.appendChild(div);
    });
}

/* ================= NAV ================= */

function next() {
    index = (index + 1) % filtered.length;
    render(index);
}

function prev() {
    index = (index - 1 + filtered.length) % filtered.length;
    render(index);
}

function randomPokemon() {
    index = Math.floor(Math.random() * filtered.length);
    render(index);
}

/* ================= JUMP ================= */

function jumpToDex() {
    const dex = parseInt(document.getElementById("jumpDex").value);
    const found = filtered.findIndex(p => p.evo === dex);
    if (found >= 0) render(found);
}

/* ================= INIT ================= */

render(index);

</script>

</body>
</html>
